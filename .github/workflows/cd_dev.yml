name: Deploy on dev server
on:
  push:
    branches: [ main ]
      

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: pnpm/action-setup@v6
        with:
          version: 10
  redeploying:
    runs-on: ubuntu-latest
    name: re-Deploying whole app to development environment
    steps: 
    - run: | 
        echo "${{ secrets.SSH_PRIVATE_KEY }}" &> ~/ssh_key
        chmod 700 /home/runner/ssh_key
        ssh -oStrictHostKeyChecking=no -i ~/ssh_key root@64.227.162.230 -t "cd /root/DevOps && git pull && pnpm install && pnpm run build && pm2 restart fe-server && pm2 restart ws-server && pm2 restart http-server"
        
        
        
        
        